<!doctype html>
<html lang="uk">
<head>
    <title>{% block title %}Освітня Платформа{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto 40px;
            padding: 20px 0;
        }

        main {
            margin-bottom: 30px;
        }

        nav {
            margin-bottom: 30px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        footer {
            font-size: 14px;
            padding-top: 20px;
            color: #666;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

{% include 'courses/includes/navbar.html' %}

{% block main %}
{% endblock %}

{% include 'courses/includes/footer.html' %}

</body>
</html>
