<!doctype html>
<html lang="uk">
<head>
    <title>Освітня Платформа</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #1f2937;
            line-height: 1.5;
            background: #ffffff;
        }

        a {
            color: #0b57d0;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        header,
        .site-header {
            margin: 0 0 30px;
            padding: 0;
            border: 0;
            background: transparent;
        }

        .brand {
            display: none;
        }

        .container {
            width: auto;
            margin: 0;
        }

        .site-header .container {
            display: block;
            padding: 0;
        }

        nav,
        .site-nav {
            display: block;
            margin: 0 0 30px;
        }

        header nav,
        header .site-nav,
        .site-header .site-nav {
            margin-bottom: 0;
        }

        nav a,
        .site-nav a {
            margin-right: 15px;
        }

        main,
        main.container {
            margin-bottom: 30px;
            padding: 0;
        }

        .page-layout {
            display: block;
            margin-bottom: 30px;
        }

        .sidebar {
            display: none;
        }

        .course-card,
        .page-card {
            margin: 0 0 16px;
            padding: 0;
            border: 0;
            background: transparent;
        }

        h1,
        strong {
            display: block;
            margin: 0 0 16px;
            font-size: 20px;
            font-weight: bold;
        }

        .course-card h2,
        .page-card h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        ul {
            padding-left: 20px;
        }

        label {
            font-weight: bold;
        }

        footer,
        .site-footer {
            font-size: 14px;
            padding-top: 20px;
            color: #666;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'home' %}">Головна</a>
    <a href="{% url 'courses_list' %}">Список Курсів</a>
    <a href="{% url 'about' %}">Про Нас</a>
</nav>

<main>
    {% if course %}
        <div>
            <label>Назва Курсу: </label>{{ course.name }}
        </div>
        <div>
            <label>Опис Курсу: </label>{{ course.description|truncatewords:4 }}
        </div>
    {% else %}
        <div>Курс Не Знайдено</div>
    {% endif %}
</main>

<footer>
    (c) {% now 'Y' %} Освітня Платформа
</footer>
</body>
</html>
